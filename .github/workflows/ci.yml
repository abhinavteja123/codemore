name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install web dependencies
        run: npm ci
        working-directory: web
      - name: Type check web
        run: npx tsc --noEmit
        working-directory: web
      - name: Install daemon dependencies
        run: npm ci
        working-directory: daemon
      - name: Type check daemon
        run: npx tsc --noEmit
        working-directory: daemon

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install web dependencies
        run: npm ci
        working-directory: web
      - name: Lint web
        run: npm run lint || true
        working-directory: web

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install and test web
        run: npm ci && npm test --if-present
        working-directory: web
      - name: Install and test daemon
        run: npm ci && npm test --if-present
        working-directory: daemon

  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Audit web dependencies
        run: npm audit --audit-level=high || true
        working-directory: web
      - name: Audit daemon dependencies
        run: npm audit --audit-level=high || true
        working-directory: daemon

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install web dependencies
        run: npm ci
        working-directory: web
      - name: Build web
        run: npm run build
        working-directory: web
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder' }}

  secret-scan:
    name: Secret scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  self-scan:
    name: CodeMore self-scan
    runs-on: ubuntu-latest
    needs: [typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Build daemon
        run: npm ci && npm run build
        working-directory: daemon
      - name: Self-scan
        run: |
          node dist/index.js scan \
            --paths ./daemon/services ./web/src ./src \
            --config ../.codemorerc.json \
            --fail-on blocker \
            --fail-on critical \
            --output-format json \
            --output-file self-scan-results.json
        working-directory: daemon
      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: self-scan-${{ github.sha }}
          path: daemon/self-scan-results.json
          retention-days: 30
